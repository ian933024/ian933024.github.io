<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <title>貓頭鷹的教檢筆記</title>
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-BNPS40ENC4"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-BNPS40ENC4');
    </script>
    <style>
      :root { --theme-color: #4f46e5; }

      /* ── Navbar buttons ── */
      .app-nav li a {
        display: inline-block;
        padding: 5px 13px;
        border-radius: 7px;
        font-size: 0.85rem;
        font-weight: 600;
        text-decoration: none !important;
        transition: opacity .15s;
      }
      .app-nav li a:hover { opacity: 0.82; }

      /* 考古題分析 — indigo */
      .app-nav a[href*="teacher_exam"] {
        background: #4f46e5;
        color: #fff !important;
      }
      /* Apple Podcasts — pink/red */
      .app-nav a[href*="apple.com"] {
        background: #f74570;
        color: #fff !important;
      }
      /* Spotify — green */
      .app-nav a[href*="spotify.com"] {
        background: #1db954;
        color: #fff !important;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      window.$docsify = {
        name: '🦉 貓頭鷹的教檢筆記',
        repo: '',
        loadSidebar: true,
        loadNavbar: true,
        subMaxLevel: 0,
        auto2top: true,
        search: {
          placeholder: '搜尋筆記…',
          noData: '找不到相關內容',
          depth: 3,
        },
        plugins: [
          function(hook) {
            hook.doneEach(function() {
              var nav = document.querySelector('.app-nav');
              if (!nav) return;
              var hash = location.hash;
              var isHome = hash === '' || hash === '#' || hash === '#/';
              nav.style.display = isHome ? 'none' : '';
            });
          }
        ],
      }
    </script>
    <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  </body>
</html>
