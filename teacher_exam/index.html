<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>歷屆教檢考古題內容分析</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">110-114 國民小學教師資格考試</p>
        <h1>歷屆教檢考古題內容分析</h1>
      </div>
      <div class="header-actions">
        <button id="resetFilters" type="button">清除篩選</button>
        <button id="downloadCsv" type="button">下載目前結果</button>
      </div>
    </header>

    <main>
      <section class="summary-grid" aria-label="資料摘要">
        <div class="metric">
          <span>題目數</span>
          <strong id="totalQuestions">-</strong>
        </div>
        <div class="metric">
          <span>目前篩選</span>
          <strong id="visibleQuestions">-</strong>
        </div>
        <div class="metric">
          <span>重點數</span>
          <strong id="totalFocuses">-</strong>
        </div>
        <div class="metric">
          <span>高頻重點</span>
          <strong id="highFrequencyCount">-</strong>
        </div>
      </section>

      <section class="controls" aria-label="篩選條件">
        <label>
          年份
          <select id="yearFilter"></select>
        </label>
        <label>
          科目
          <select id="subjectFilter"></select>
        </label>
        <label>
          小科目
          <select id="smallSubjectFilter"></select>
        </label>
        <label>
          題型
          <select id="typeFilter"></select>
        </label>
        <label>
          本題重點
          <select id="focusFilter"></select>
        </label>
        <label class="search-field">
          關鍵字
          <input id="keywordSearch" type="search" placeholder="搜尋題目、重點或情境" />
        </label>
      </section>

      <section class="content-layout">
        <aside class="sidebar" aria-label="高頻重點">
          <div class="section-heading">
            <h2>高頻重點</h2>
            <span id="focusListCount">-</span>
          </div>
          <div id="focusList" class="focus-list"></div>
        </aside>

        <section class="results" aria-label="分析結果">
          <div class="section-heading">
            <h2>逐題分析</h2>
            <span id="resultCount">-</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>年份</th>
                  <th>科目</th>
                  <th>題型</th>
                  <th>題號</th>
                  <th>小科目</th>
                  <th>本題重點</th>
                  <th>題目內容</th>
                </tr>
              </thead>
              <tbody id="questionRows"></tbody>
            </table>
          </div>
        </section>
      </section>

      <section class="frequency-section" aria-label="重點頻率分析">
        <div class="section-heading">
          <h2>重點頻率分析</h2>
          <span>依目前篩選即時更新</span>
        </div>
        <div class="table-wrap compact">
          <table>
            <thead>
              <tr>
                <th>排名</th>
                <th>本題重點</th>
                <th>題數</th>
                <th>科目</th>
                <th>小科目</th>
              </tr>
            </thead>
            <tbody id="frequencyRows"></tbody>
          </table>
        </div>
      </section>

      <section class="source-section" aria-label="資料來源與整理方法">
        <div>
          <h2>資料來源</h2>
          <ul id="sourceList"></ul>
        </div>
        <div>
          <h2>整理方法</h2>
          <ol id="methodList"></ol>
        </div>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
