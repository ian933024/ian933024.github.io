<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>教檢考古題頻率分析</title>
    <link rel="stylesheet" href="./styles.css" />
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-BNPS40ENC4"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-BNPS40ENC4');
    </script>
  </head>
  <body>
    <header class="app-header">
      <div class="header-left">
        <h1>教檢考古題頻率分析</h1>
        <p id="headerSub">110–114 年 國民小學教師資格考試</p>
      </div>
      <div class="header-actions">
        <a href="https://github.com/ian933024/teacher_exam_memo" target="_blank" rel="noopener noreferrer" class="header-btn">
          📓 教檢筆記
        </a>
        <a href="https://podcasts.apple.com/us/podcast/owlpod/id1770660866?itscg=30200&itsct=podcast_box_badge&ls=1&mttnsubad=1770660866" target="_blank" rel="noopener noreferrer" class="header-podcast-apple">
          <img src="https://toolbox.marketingtools.apple.com/api/v2/badges/listen-on-apple-podcasts/badge-26/en-us" alt="Listen on Apple Podcasts" />
        </a>
        <a href="https://open.spotify.com/show/1LOdnVGFhjlBgCvxwab8oQ" target="_blank" rel="noopener noreferrer" class="header-podcast-spotify">
          <span>Listen on</span>
          <img src="https://storage.googleapis.com/pr-newsroom-wp/1/2023/05/Spotify_Full_Logo_RGB_Green.png" alt="Spotify" />
        </a>
      </div>
    </header>

    <div class="app-body">
      <aside class="sidebar">

        <div class="sb-section">
          <div class="sb-label">
            小科目
            <span class="sb-badge" id="subjectBadge" hidden></span>
          </div>
          <div class="pill-wrap" id="subjectPills"></div>
        </div>

        <div class="sb-section">
          <div class="sb-label">直接跳至本題重點</div>
          <select id="focusSelect" class="focus-select">
            <option value="">— 選取跳至 —</option>
          </select>
        </div>

        <div class="sb-section">
          <div class="sb-label">搜尋本題重點</div>
          <input
            class="search-input"
            type="search"
            id="focusSearch"
            placeholder="輸入關鍵字篩選…"
            autocomplete="off"
          />
        </div>

        <div class="results-meta">
          <span id="resultCount"></span>
          <button class="btn-clear" id="clearBtn" type="button" hidden>✕ 清除篩選</button>
        </div>
        <button class="btn-download" id="downloadBtn" type="button">↓ 下載篩選題目 (CSV)</button>

      </aside>

      <main id="focusList" role="list"></main>
    </div>

    <footer class="app-footer" id="appFooter"></footer>

    <script src="./app2.js" defer></script>
  </body>
</html>
