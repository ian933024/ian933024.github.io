<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>歷屆教檢考古題內容分析</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="app-header">
      <p class="eyebrow">110-114 國民小學教師資格考試</p>
      <h1>歷屆教檢考古題內容分析</h1>
      <p class="lede">選一個概念，看它考過幾次、出現在哪些題目；或選一個小科目，看它底下有哪些常考概念。</p>
    </header>

    <main>
      <section class="panel" aria-labelledby="focusTitle">
        <div class="panel-heading">
          <div>
            <h2 id="focusTitle">依概念查題目</h2>
            <p>選取一個本題重點，查看歷屆出題紀錄。</p>
          </div>
          <strong id="focusCount" class="count-pill">-</strong>
        </div>

        <label class="select-label" for="focusSelect">本題重點</label>
        <select id="focusSelect"></select>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>年份</th>
                <th>科目</th>
                <th>題型</th>
                <th>題號</th>
                <th>題目內容</th>
              </tr>
            </thead>
            <tbody id="focusQuestionRows"></tbody>
          </table>
        </div>
      </section>

      <section class="panel" aria-labelledby="smallSubjectTitle">
        <div class="panel-heading">
          <div>
            <h2 id="smallSubjectTitle">依小科目看概念</h2>
            <p>選取一個小科目，查看有哪些概念與各自出現次數。</p>
          </div>
          <strong id="smallSubjectCount" class="count-pill">-</strong>
        </div>

        <label class="select-label" for="smallSubjectSelect">小科目</label>
        <select id="smallSubjectSelect"></select>

        <div id="conceptList" class="concept-list"></div>
      </section>

      <details class="panel frequency-panel">
        <summary>完整頻率分析表</summary>
        <div class="table-wrap compact">
          <table>
            <thead>
              <tr>
                <th>排名</th>
                <th>本題重點</th>
                <th>題數</th>
                <th>涵蓋科目</th>
                <th>涵蓋小科目</th>
              </tr>
            </thead>
            <tbody id="frequencyRows"></tbody>
          </table>
        </div>
      </details>

      <section class="source-section" aria-label="資料來源與整理方法">
        <div>
          <h2>資料來源</h2>
          <ul id="sourceList"></ul>
        </div>
        <div>
          <h2>整理方法</h2>
          <ol id="methodList"></ol>
        </div>
      </section>
    </main>

    <script src="./app2.js" defer></script>
  </body>
</html>
